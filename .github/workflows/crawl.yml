name: Crawl Issuer Catalogs

on:
  # Run daily at 6:00 UTC so aggregated data stays fresh (e.g. OID4VCI metadata, git dates)
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  # When a community catalog JSON is added or changed on main, run the crawler and commit updated aggregated data
  push:
    branches:
      - main
    paths:
      - 'community-catalogs/**/issuer-catalog.json'

jobs:
  crawl:
    name: Crawl and Aggregate
    runs-on: ubuntu-latest
    if: github.repository == 'FIDEScommunity/fides-issuer-catalog'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run crawler
        run: npm run crawl

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/aggregated.json data/issuer-history-state.json
          git commit -m "chore: update aggregated issuer data [skip ci]"
          git push
