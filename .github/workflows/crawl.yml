name: Crawl Issuer Catalogs

on:
  # Run daily at 6:00 UTC so aggregated data stays fresh (e.g. OID4VCI metadata, git dates)
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  # When a community catalog JSON is added or changed on main, run the crawler and commit updated aggregated data
  push:
    branches:
      - main
    paths:
      - 'community-catalogs/**/issuer-catalog.json'
      - 'src/crawler/**'

jobs:
  crawl:
    name: Crawl and Aggregate
    runs-on: ubuntu-latest
    if: github.repository == 'FIDEScommunity/fides-issuer-catalog'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run crawler
        run: npm run crawl

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/aggregated.json data/issuer-history-state.json
          git commit -m "chore: update aggregated issuer data [skip ci]"
          git push

      # Tells the production WordPress site to flush its aggregated.json cache
      # (Fides_Catalog_Source transient + options-backup) so freshly crawled
      # issuers show up in seconds instead of after the 6h TTL.
      # Set both `vars.WP_INVALIDATE_URL` and `secrets.WP_INVALIDATE_SECRET`
      # in the repo settings to enable. Forks / unconfigured repos skip
      # silently. A failed call does not break the workflow — production
      # falls back to its 6h TTL.
      - name: Notify production WordPress to flush catalog cache
        if: steps.changes.outputs.changed == 'true'
        env:
          WP_INVALIDATE_URL: ${{ vars.WP_INVALIDATE_URL }}
          WP_INVALIDATE_SECRET: ${{ secrets.WP_INVALIDATE_SECRET }}
          CATALOG_TYPE: issuer
        run: |
          if [ -z "${WP_INVALIDATE_URL}" ] || [ -z "${WP_INVALIDATE_SECRET}" ]; then
            echo "Skipping: WP_INVALIDATE_URL/SECRET not configured for this repo."
            exit 0
          fi
          echo "Notifying ${WP_INVALIDATE_URL} (type=${CATALOG_TYPE})..."
          curl -fsS -X POST "${WP_INVALIDATE_URL}" \
            -H "X-FIDES-Catalog-Secret: ${WP_INVALIDATE_SECRET}" \
            --data-urlencode "type=${CATALOG_TYPE}" \
            -w '\nHTTP %{http_code}\n' \
            || echo "WP invalidate failed (non-fatal; production has 6h TTL fallback)"
