name: Validate Issuer Catalogs

on:
  push:
    paths:
      - 'community-catalogs/**/issuer-catalog.json'
      - 'schemas/**'
      - '.github/workflows/validate.yml'
      - 'package.json'
  pull_request:
    paths:
      - 'community-catalogs/**/issuer-catalog.json'
      - 'schemas/**'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate issuer catalogs
        run: |
          echo "Validating issuer catalogs against schema..."
          npm run validate
          echo "All issuer catalogs are valid!"
